# SPDX-License-Identifier: Apache-2.0
# EH2 directed tests, modeled after Ibex's directed_tests/directed_testlist.yaml.

- config: eh2_directed
  rtl_test: core_eh2_base_test
  timeout_s: 300
  gcc_opts: "-O2 -g -static -nostdlib -nostartfiles"
  ld_script: tests/asm/cosim_link.ld
  includes: tests/asm

- config: eh2_directed_pic
  rtl_test: core_eh2_pic_test
  timeout_s: 300
  gcc_opts: "-O2 -g -static -nostdlib -nostartfiles"
  ld_script: tests/asm/cosim_link.ld
  includes: tests/asm

- config: eh2_directed_fetch_toggle
  rtl_test: core_eh2_fetch_toggle_test
  timeout_s: 300
  gcc_opts: "-O2 -g -static -nostdlib -nostartfiles"
  ld_script: tests/asm/cosim_link.ld
  includes: tests/asm

- test: directed_smoke
  desc: "Mailbox smoke test running through the directed-test pipeline"
  config: eh2_directed
  test_srcs: tests/asm/cosim_smoke.S
  iterations: 1

- test: directed_alu
  desc: "Deterministic ALU directed test"
  config: eh2_directed
  test_srcs: tests/asm/cosim_alu.S
  iterations: 1

- test: directed_load_store
  desc: "Deterministic load/store directed test"
  config: eh2_directed
  test_srcs: tests/asm/cosim_load_store.S
  iterations: 1

- test: directed_irq_basic
  desc: "Basic software interrupt trigger and trap handler"
  config: eh2_directed
  test_srcs: tests/asm/directed_irq_basic.S
  iterations: 1

- test: directed_pmp_smoke
  desc: "PMP region config and access fault trap"
  config: eh2_directed
  test_srcs: tests/asm/directed_pmp_smoke.S
  cosim: enabled
  iterations: 1

- test: directed_csr_warl
  desc: "EH2 custom CSR WARL read-back smoke"
  config: eh2_directed
  test_srcs: tests/asm/directed_csr_warl.S
  cosim: disabled
  iterations: 1

- test: directed_double_issue_hazard
  desc: "Dual-issue RAW/WAR/WAW hazard ordering"
  config: eh2_directed
  test_srcs: tests/asm/directed_double_issue_hazard.S
  iterations: 1

- test: directed_nb_load_chain
  desc: "Three consecutive NB-loads + dependent branch (RISK-5)"
  config: eh2_directed
  test_srcs: tests/asm/directed_nb_load_chain.S
  iterations: 1

- test: directed_axi4_error_inject
  desc: "AXI4 SLVERR/DECERR injection triggers load access fault"
  config: eh2_directed
  test_srcs: tests/asm/directed_axi4_error_inject.S
  cosim: disabled
  sim_opts: '+enable_axi4_error_inject=1 +axi4_error_pct=100'
  iterations: 1

- test: directed_illegal_instr
  desc: "Illegal instruction exception handling"
  config: eh2_directed
  test_srcs: tests/asm/directed_illegal_instr.S
  iterations: 1

- test: directed_nested_irq
  desc: "Nested ECALL trap handler"
  config: eh2_directed
  test_srcs: tests/asm/directed_nested_irq.S
  iterations: 1

- test: directed_debug_basic
  desc: "EBREAK breakpoint exception handling"
  config: eh2_directed
  test_srcs: tests/asm/directed_debug_basic.S
  iterations: 1

- test: directed_pmp_regions
  desc: "Multi-region PMP configuration and access fault"
  config: eh2_directed
  test_srcs: tests/asm/directed_pmp_regions.S
  cosim: enabled
  iterations: 1

