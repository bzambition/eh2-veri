# Coverage pump directed tests (Task-D)

- test: directed_pic_state_walk
  desc: "PIC/trap claim-complete state stimulus with IRQ sideband"
  config: eh2_directed_pic
  test_srcs: tests/asm/directed_pic_state_walk.S
  sim_opts: '+enable_irq_seq=1 +enable_irq_single_seq=1 +max_interval=20'
  cosim: disabled
  iterations: 1

- test: directed_dbg_dret_walk
  desc: "Debug halt/resume and breakpoint trap stimulus"
  config: eh2_directed
  test_srcs: tests/asm/directed_dbg_dret_walk.S
  sim_opts: '+enable_debug_seq=1 +enable_debug_single=1 +max_interval=20'
  cosim: disabled
  iterations: 1

- test: directed_dma_burst
  desc: "Dense aligned memory burst to exercise DMA/AXI memory paths"
  config: eh2_directed
  test_srcs: tests/asm/directed_dma_burst.S
  cosim: disabled
  iterations: 1

- test: directed_ifu_bp_btb
  desc: "Repeated branch and call targets for IFU BP/BTB coverage"
  config: eh2_directed_fetch_toggle
  test_srcs: tests/asm/directed_ifu_bp_btb.S
  sim_opts: '+enable_fetch_toggle=1'
  cosim: disabled
  iterations: 1

- test: directed_lsu_stbuf_full
  desc: "Back-to-back stores and fence to pressure LSU store buffer"
  config: eh2_directed
  test_srcs: tests/asm/directed_lsu_stbuf_full.S
  cosim: disabled
  iterations: 1

- test: directed_iccm_eccerror
  desc: "Aligned ICCM fetch loop with memory-error injection window"
  config: eh2_directed
  test_srcs: tests/asm/directed_iccm_eccerror.S
  sim_opts: '+enable_mem_error=1'
  cosim: disabled
  iterations: 1

- test: directed_toggle_axi4_data_walk
  desc: "AXI4 data bus toggle pump (R3-B)"
  config: eh2_directed
  test_srcs: tests/asm/directed_toggle_axi4_data_walk.S
