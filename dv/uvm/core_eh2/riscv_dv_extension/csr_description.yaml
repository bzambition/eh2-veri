# ---------------------------------------------------------------------------
- csr: mscause
  address: 0x7FF
  description: "Machine secondary exception cause"
  fields:
    - field: [31:0]
      name: mscause
      type: R/W

- csr: mrac
  address: 0x7C0
  description: "Region access control"
  fields:
    - field: [31:0]
      name: mrac
      type: R/W

- csr: mfdc
  address: 0x7C9
  description: "Feature disable control"
  fields:
    - field: [31:0]
