      type: R/W

- csr: mitb1
  address: 0x7D6
  description: "Internal timer 1 bound"
  fields:
    - field: [31:0]
      name: mitb1
      type: R/W

- csr: mitctl1
  address: 0x7D7
  description: "Internal timer 1 control"
  fields:
    - field: [31:0]
